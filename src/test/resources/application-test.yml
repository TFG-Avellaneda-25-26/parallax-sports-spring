spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  alerts:
    generation-enabled: true
    dispatch-enabled: true
    stream-trim-enabled: false
    http-fallback-enabled: false
    ktor-base-url: http://localhost:1
    ktor-api-key: test-api-key-1234
  jwt:
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 604800
