spring:
  config:
    import:
      - optional:classpath:api-secrets.yml
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000

      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 2000ms
  application:
    name: parallax-sports-api
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 12345
  jpa:
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          discord:
            client-id: dev-change-me-oauth-discord-id
            client-secret: dev-change-me-oauth-discord-secret
            scope:
              - identify
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/discord"
            client-name: Discord
          google:
            client-id: dev-change-me-oauth-google-id
            client-secret: dev-change-me-oauth-google-secret
            scope:
              - email
              - profile
        provider:
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: username

app:
  frontend-url: http://localhost:4200
  cookie:
    secure: false
  bot:
    api-key: dev-change-me-bot-api-key
  jwt:
    secret: dev-change-me-jwt-secret-32chars
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 604800
  external-api:
    openf1-base-url: https://api.openf1.org/v1
    balldontlie-base-url: https://api.balldontlie.io
    balldontlie-api-key:
  external-sync:
    enabled: true
    zone-id: UTC
    daily-cron: 0 30 0 * * *
    years-back: 0
    years-forward: 1
    nba-enabled: true
    wnba-enabled: true
  alerts:
    generation-enabled: true
    dispatch-enabled: false
    dispatch-cron: 0 * * * * *
    stream-trim-enabled: true
    stream-max-len: 200000
    http-fallback-enabled: false
    ktor-base-url:
    ktor-api-key:

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

observability:
  loki-url: http://localhost:3100

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,mappings,conditions
