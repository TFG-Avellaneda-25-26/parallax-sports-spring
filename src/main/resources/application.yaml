spring:
  data:
    redis:
      host: ${REDIS_HOST://localhost}
      port: 6379
      password:
      timeout: 2000

      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 2000ms
  application:
    name: parallax-sports-api
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:12345}
  jpa:
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:dev-change-me-jwt-secret-32chars}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:120}
    refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:600}
  discord:
    bot-token: ${DISCORD_BOT_TOKEN:dev-discord-token}
  external-api:
    openf1-base-url: ${OPENF1_BASE_URL:https://api.openf1.org/v1}
    apifootball-api-key: ${APIFOOTBALL_API_KEY}
    pandascore-api-key: ${PANDASCORE_API_KEY}
  external-sync:
    enabled: ${EXTERNAL_SYNC_ENABLED:true}
    zone-id: ${EXTERNAL_SYNC_ZONE_ID:UTC}
    daily-cron: ${EXTERNAL_SYNC_DAILY_CRON:0 30 0 * * *}
    years-back: ${EXTERNAL_SYNC_YEARS_BACK:0}
    years-forward: ${EXTERNAL_SYNC_YEARS_FORWARD:1}
  alerts:
    generation-enabled: ${ALERTS_GENERATION_ENABLED:true}
    default-channel: ${ALERTS_DEFAULT_CHANNEL:telegram}
    default-lead-time-minutes: ${ALERTS_DEFAULT_LEAD_MINUTES:30}
    dispatch-enabled: ${ALERTS_DISPATCH_ENABLED:false}
    dispatch-cron: ${ALERTS_DISPATCH_CRON:0 * * * * *}
    dispatch-batch-size: ${ALERTS_DISPATCH_BATCH_SIZE:100}
    telegram-stream: ${ALERTS_TELEGRAM_STREAM:alerts.telegram.v1}
    discord-stream: ${ALERTS_DISCORD_STREAM:alerts.discord.v1}
    email-stream: ${ALERTS_EMAIL_STREAM:alerts.email.v1}
    telegram-dlq-stream: ${ALERTS_TELEGRAM_DLQ_STREAM:alerts.telegram.dlq.v1}
    discord-dlq-stream: ${ALERTS_DISCORD_DLQ_STREAM:alerts.discord.dlq.v1}
    email-dlq-stream: ${ALERTS_EMAIL_DLQ_STREAM:alerts.email.dlq.v1}
    telegram-consumer-group: ${ALERTS_TELEGRAM_CONSUMER_GROUP:alerts.telegram.workers.v1}
    discord-consumer-group: ${ALERTS_DISCORD_CONSUMER_GROUP:alerts.discord.workers.v1}
    email-consumer-group: ${ALERTS_EMAIL_CONSUMER_GROUP:alerts.email.workers.v1}
    pending-claim-idle-ms: ${ALERTS_PENDING_CLAIM_IDLE_MS:60000}
    stream-trim-enabled: ${ALERTS_STREAM_TRIM_ENABLED:true}
    stream-max-len: ${ALERTS_STREAM_MAX_LEN:200000}
    http-fallback-enabled: ${ALERTS_HTTP_FALLBACK_ENABLED:false}
    ktor-base-url: ${KTOR_ALERTS_BASE_URL:}
    ktor-dispatch-path: ${KTOR_ALERTS_DISPATCH_PATH:/internal/alerts/dispatch}
    ktor-api-key: ${KTOR_ALERTS_API_KEY}

observability:
  loki-url: ${LOKI_URL:http://localhost:3100}
  prometheus-url: ${PROMETHEUS_URL:http://localhost:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,mappings,conditions,env,beans
