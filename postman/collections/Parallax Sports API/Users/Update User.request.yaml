$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/api/users/:id'
order: 3000
pathVariables:
  - key: id
    value: '{{userId}}'
    description: User ID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "displayName": "Updated Name"
    }
