$kind: http-request
name: Update User Settings
method: PUT
url: '{{baseUrl}}/api/users/:userId/settings'
order: 2000
pathVariables:
  - key: userId
    value: '{{userId}}'
    description: User ID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "theme": "dark",
      "defaultView": "dashboard",
      "timezone": "UTC",
      "locale": "en-US"
    }
